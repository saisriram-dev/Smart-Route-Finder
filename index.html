<!DOCTYPE html>
<html>

<head>
    <title>Smart Campus Route Finder</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <h1>🧭 Smart Campus Navigator</h1>
</header>

<div class="container">

    <div class="controls">

        <div class="field">
            <label>📍 Start Location</label>
            <select id="start"></select>
        </div>

        <div class="field">
            <label>🎯 Destination</label>
            <select id="end"></select>
        </div>

        <button id="findBtn">Find Optimal Route</button>

    </div>

    <div class="output">

        <h2>Route Result</h2>

        <div class="routeBox">
            <p id="resultText">Route will appear here</p>
        </div>

    </div>

</div>

<footer>
DSA + Web Technology Project | Shortest Path using Dijkstra Algorithm
</footer>

<script src="app.js"></script>

</body>
</html>
